<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>일일 미션</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/seullyeee-art/mirai-shared@main/styles.css">
<style>
  * {
    margin: 0; padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  :root {
    --primary-normal: #14c391;
    --primary-heavy: #13bb8f;

    --label-normal: #f7f7f8;
    --label-strong: #ffffff;
    --label-neutral: rgba(194, 196, 200, 0.88);
    --label-alternative: rgba(174, 176, 182, 0.61);
    --label-assistive: rgba(174, 176, 182, 0.28);

    --bg-normal: #1b1c1e;

    --line-alternative: rgba(112, 115, 124, 0.22);

    --fill-normal: rgba(112, 115, 124, 0.22);
    --fill-strong: rgba(112, 115, 124, 0.28);

    --status-negative: #ff6363;
    --status-cautionary: #ffa938;
  }

  html { font-size: 16px; }

  body {
    font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100dvh;
    background: var(--bg-normal);
    overflow-x: hidden;
    color: var(--label-normal);
  }

  .phone-frame {
    width: 100%; max-width: 960px;
    margin: 0 auto;
    min-height: 100dvh;
    padding-bottom: 40px;
  }

  /* ═══ NAV STACK (sticky + blur 한 묶음) ═══ */
  .nav-stack {
    position: sticky; top: 60px; z-index: 99;
    backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
    background: rgba(27, 28, 30, 0.88);
  }

  /* === PAGE NAV (백버튼 + 타이틀 + 잔액) === */
  .page-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px;
    height: 56px;
    width: 100%;
  }
  @media (max-width: 768px){
    mirai-header { display: none; }
    .nav-stack { top: 0; }
  }
  .back-btn {
    width: 36px; height: 36px;
    border: none; background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--label-normal); transition: all 0.2s;
    padding: 0; margin-left: -8px;
    text-decoration: none;
  }
  .back-btn:active { transform: scale(0.88); }

  .page-nav-title {
    font-size: 17px; font-weight: 700;
    color: var(--label-strong); letter-spacing: -0.3px;
    position: absolute; left: 50%; transform: translateX(-50%);
  }

  .mir-balance {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.06);
    padding: 6px 14px 6px 8px; border-radius: 20px;
    border: none;
  }
  .mir-balance span { font-size: 14px; font-weight: 700; color: var(--primary-normal); }
  .mir-glow { filter: drop-shadow(0 2px 6px rgba(20, 195, 145, 0.4)); }

  /* === PROGRESS SECTION === */
  .progress-section {
    padding: 20px 20px 16px;
  }
  .progress-title {
    font-size: 18px; font-weight: 800;
    color: var(--label-strong); letter-spacing: -0.3px;
    margin-bottom: 4px;
  }
  .progress-sub {
    font-size: 13px; font-weight: 400;
    color: var(--label-alternative); margin-bottom: 16px;
  }

  .progress-bar-wrap {
    display: flex; align-items: center; gap: 12px;
  }
  .progress-track {
    flex: 1; height: 6px;
    background: var(--fill-normal);
    border-radius: 3px; overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--primary-heavy), var(--primary-normal));
    transition: width 0.6s ease;
    box-shadow: 0 0 8px rgba(20, 195, 145, 0.4);
  }
  .progress-reward {
    display: flex; align-items: center; gap: 4px;
    flex-shrink: 0;
  }
  .progress-reward span {
    font-size: 14px; font-weight: 700; color: var(--primary-normal);
  }

  /* === TASK LIST === */
  .task-list {
    padding: 0 16px;
    display: flex; flex-direction: column; gap: 8px;
  }

  .task-item {
    display: flex; align-items: center;
    padding: 16px;
    background: linear-gradient(160deg, #28282b, #222224);
    border-radius: 16px;
    border: 1px solid #333335;
    gap: 12px;
    transition: all 0.2s;
    cursor: pointer;
  }
  .task-item:active { background: var(--fill-normal); transform: scale(0.99); }
  .task-item.completed {
    opacity: 0.5;
  }

  .task-info { flex: 1; min-width: 0; }
  .task-name {
    font-size: 14px; font-weight: 600;
    color: var(--label-strong); margin-bottom: 2px;
  }
  .task-item.completed .task-name {
    text-decoration: line-through;
    color: var(--label-neutral);
  }
  .task-reward {
    display: flex; align-items: center; gap: 4px;
    font-size: 13px; font-weight: 600;
    color: var(--primary-normal);
  }
  .task-item.completed .task-reward {
    color: var(--label-assistive);
  }
  .task-reward svg { width: 14px; height: 14px; flex-shrink: 0; }

  .task-btn {
    padding: 10px 16px; border-radius: 10px;
    border: none;
    background: rgba(112,115,124,0.32);
    font-family: inherit; font-size: 13px; font-weight: 600;
    color: var(--label-normal); cursor: pointer;
    transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
    min-width: 72px; min-height: 40px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .task-btn:active { background: var(--fill-strong); transform: scale(0.96); }
  .task-item.completed .task-btn {
    background: rgba(20, 195, 145, 0.1);
    border-color: rgba(20, 195, 145, 0.2);
    color: var(--primary-normal);
    pointer-events: none;
  }

  /* === ANIMATIONS === */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-in { animation: fadeInUp 0.45s ease-out both; }
  .d1 { animation-delay: 0.05s; }
  .d2 { animation-delay: 0.1s; }
  .d3 { animation-delay: 0.14s; }
  .d4 { animation-delay: 0.18s; }
  .d5 { animation-delay: 0.22s; }
  .d6 { animation-delay: 0.26s; }
  .d7 { animation-delay: 0.3s; }
  .d8 { animation-delay: 0.34s; }
  .d9 { animation-delay: 0.38s; }
  .d10 { animation-delay: 0.42s; }

  /* ═══ DESKTOP ═══ */
  @media (min-width: 768px) {
    .phone-frame { max-width: 960px; padding-left: 40px; padding-right: 40px; }
    .page-nav { padding: 0; height: 56px; }
    .page-nav-title { font-size: 20px; }
    .progress-section { padding: 24px 0 20px; }
    .progress-title { font-size: 20px; }
    .task-list { padding: 0; gap: 10px; }
    .task-item { padding: 20px; border-radius: 18px; }
    .task-name { font-size: 16px; }
    .task-reward { font-size: 14px; }
    .task-btn { padding: 12px 20px; font-size: 14px; min-height: 44px; }
  }
</style>
</head>
<body>

<div class="app">

<mirai-sidebar active="store"></mirai-sidebar>

<div class="content-wrap">

  <!-- 공통 헤더 (검색 + 미르 + 아바타) -->
  <mirai-header></mirai-header>

<div class="phone-frame">

  <!-- 페이지 네비 (백버튼 + 타이틀 + 잔액) -->
  <div class="nav-stack">
    <header class="page-nav">
      <a href="index.html" class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </a>
      <span class="page-nav-title">일일 미션</span>
      <div class="mir-balance">
        <img src="images/mir.png" width="22" height="22" alt="미르" style="object-fit:contain;">
        <span>95</span>
      </div>
    </header>
  </div>

  <!-- Progress -->
  <div class="progress-section animate-in d1">
    <div class="progress-title">작업 진행 (0 / 6)</div>
    <div class="progress-sub">모든 임무를 완성하고 최대 160 미르를 받으세요!</div>
    <div class="progress-bar-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
      <div class="progress-reward">
        <img src="images/mir.png" width="20" height="20" alt="미르" style="object-fit:contain;">
        <span>160</span>
      </div>
    </div>
  </div>

  <!-- Task List -->
  <div class="task-list">

    <div class="task-item animate-in d2" data-reward="5">
      <div class="task-info">
        <div class="task-name">대화 10라운드 완료</div>
        <div class="task-reward">
          <img src="images/mir.png" width="14" height="14" alt="미르" style="object-fit:contain;">
          +5
        </div>
      </div>
      <button class="task-btn" onclick="completeTask(this)">보상받기</button>
    </div>

    <div class="task-item animate-in d3" data-reward="10">
      <div class="task-info">
        <div class="task-name">대화 30라운드 완료</div>
        <div class="task-reward">
          <img src="images/mir.png" width="14" height="14" alt="미르" style="object-fit:contain;">
          +10
        </div>
      </div>
      <button class="task-btn" onclick="completeTask(this)">보상받기</button>
    </div>

    <div class="task-item animate-in d4" data-reward="15">
      <div class="task-info">
        <div class="task-name">대화 50라운드 완료</div>
        <div class="task-reward">
          <img src="images/mir.png" width="14" height="14" alt="미르" style="object-fit:contain;">
          +15
        </div>
      </div>
      <button class="task-btn" onclick="completeTask(this)">보상받기</button>
    </div>

    <div class="task-item animate-in d5" data-reward="10">
      <div class="task-info">
        <div class="task-name">댓글 1개 작성</div>
        <div class="task-reward">
          <img src="images/mir.png" width="14" height="14" alt="미르" style="object-fit:contain;">
          +10
        </div>
      </div>
      <button class="task-btn" onclick="completeTask(this)">보상받기</button>
    </div>

    <div class="task-item animate-in d6" data-reward="10">
      <div class="task-info">
        <div class="task-name">새 캐릭터와 대화 시작</div>
        <div class="task-reward">
          <img src="images/mir.png" width="14" height="14" alt="미르" style="object-fit:contain;">
          +10
        </div>
      </div>
      <button class="task-btn" onclick="completeTask(this)">보상받기</button>
    </div>

    <div class="task-item animate-in d7" data-reward="10">
      <div class="task-info">
        <div class="task-name">갤러리/컷씬 1개 열기</div>
        <div class="task-reward">
          <img src="images/mir.png" width="14" height="14" alt="미르" style="object-fit:contain;">
          +10
        </div>
      </div>
      <button class="task-btn" onclick="completeTask(this)">보상받기</button>
    </div>

    <div class="task-item animate-in d9" data-reward="100">
      <div class="task-info">
        <div class="task-name">모든 일일 미션 완료 보너스</div>
        <div class="task-reward">
          <img src="images/mir.png" width="14" height="14" alt="미르" style="object-fit:contain;">
          +100
        </div>
      </div>
      <button class="task-btn" onclick="completeTask(this)">보상받기</button>
    </div>

  </div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/gh/seullyeee-art/mirai-shared@main/components.js" defer></script>
<script>
  let completedCount = 0;
  const totalTasks = 6;

  function completeTask(btn) {
    const item = btn.closest('.task-item');
    if (item.classList.contains('completed')) return;

    item.classList.add('completed');
    btn.textContent = '완료';
    completedCount++;

    // Update progress
    const pct = (completedCount / totalTasks) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    document.querySelector('.progress-title').textContent = `작업 진행 (${completedCount} / ${totalTasks})`;

    // Animate
    item.style.transform = 'scale(0.98)';
    setTimeout(() => { item.style.transform = ''; }, 200);
  }
</script>
</body>
</html>
